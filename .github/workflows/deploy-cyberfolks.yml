name: Deploy to CyberFolks

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload dist via scp (SSH)
        env:
          SSH_HOST: ${{ secrets.CYBERFOLKS_HOST }}
          SSH_USER: ${{ secrets.CYBERFOLKS_USER }}
          SSH_PORT: ${{ secrets.CYBERFOLKS_PORT }}
          SSH_KEY: ${{ secrets.CYBERFOLKS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          SSH_OPTS="-i ~/.ssh/deploy_key -p $SSH_PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o BatchMode=yes"
          ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p domains/orthomedica.lubin.pl/public_html"
          scp $SSH_OPTS -r dist/* "$SSH_USER@$SSH_HOST:domains/orthomedica.lubin.pl/public_html/"
