name: Deploy to CyberFolks

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload dist via tar over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.CYBERFOLKS_HOST }}
          SSH_USER: ${{ secrets.CYBERFOLKS_USER }}
          SSH_PORT: ${{ secrets.CYBERFOLKS_PORT }}
          SSH_KEY: ${{ secrets.CYBERFOLKS_SSH_KEY }}
        run: |
          set -euo pipefail
          # Runner ssh-agent can exhaust MaxAuthTries before our deploy key is tried.
          unset SSH_AUTH_SOCK
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE="$HOME/.ssh/deploy_key"
          python - <<'PY'
          import os, pathlib
          key = os.environ["SSH_KEY"]
          path = pathlib.Path.home() / ".ssh" / "deploy_key"
          # Normalize newlines (GitHub Secrets sometimes store CRLF)
          key = key.replace("\r\n", "\n").replace("\r", "\n").rstrip("\n") + "\n"
          path.write_text(key, encoding="utf-8")
          os.chmod(path, 0o600)
          PY
          # Best-effort: keyscan can be flaky/non-fatal; SSH still uses StrictHostKeyChecking=accept-new
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          REMOTE_DIR="domains/orthomedica.lubin.pl/public_html"
          ssh \
            -i "$KEY_FILE" \
            -p "$SSH_PORT" \
            -o IdentityFile="$KEY_FILE" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o LogLevel=ERROR \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p \"$REMOTE_DIR\""
          tar -C dist -czf - . | ssh \
            -i "$KEY_FILE" \
            -p "$SSH_PORT" \
            -o IdentityFile="$KEY_FILE" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o LogLevel=ERROR \
            "$SSH_USER@$SSH_HOST" \
            "tar -xzf - -C \"$REMOTE_DIR\""
