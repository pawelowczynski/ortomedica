# Deploy na CyberFolks wyłącznie ręcznie (workflow_dispatch).
# - holding: czyści public_html i wgrywa deploy/cyberfolks-holding/
# - full_site: buduje Astro i wgrywa dist (jak dawniej przy pushu)
# Vercel: osobno przez integrację GitHub.
name: Deploy to CyberFolks

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Co wdrożyć na orthomedica.lubin.pl'
        required: true
        type: choice
        options:
          - holding
          - full_site
        default: holding

permissions:
  contents: read

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.inputs.mode == 'full_site'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        if: github.event.inputs.mode == 'full_site'
        run: npm ci

      - name: Build Astro
        if: github.event.inputs.mode == 'full_site'
        run: npm run build

      - name: Upload via SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.CYBERFOLKS_HOST }}
          SSH_USER: ${{ secrets.CYBERFOLKS_USER }}
          SSH_PORT: ${{ secrets.CYBERFOLKS_PORT }}
          SSH_KEY: ${{ secrets.CYBERFOLKS_SSH_KEY }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          unset SSH_AUTH_SOCK
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEY_FILE="$HOME/.ssh/deploy_key"
          python - <<'PY'
          import os, pathlib
          key = os.environ["SSH_KEY"]
          path = pathlib.Path.home() / ".ssh" / "deploy_key"
          key = key.replace("\r\n", "\n").replace("\r", "\n").rstrip("\n") + "\n"
          path.write_text(key, encoding="utf-8")
          os.chmod(path, 0o600)
          PY
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          REMOTE_DIR="domains/orthomedica.lubin.pl/public_html"
          SSH_BASE=(ssh -i "$KEY_FILE" -p "$SSH_PORT" -o IdentityFile="$KEY_FILE" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o BatchMode=yes -o LogLevel=ERROR "$SSH_USER@$SSH_HOST")

          "${SSH_BASE[@]}" "mkdir -p \"$REMOTE_DIR\""

          if [[ "$MODE" == "holding" ]]; then
            "${SSH_BASE[@]}" "find \"$REMOTE_DIR\" -mindepth 1 -delete"
            tar -C deploy/cyberfolks-holding -czf - . | "${SSH_BASE[@]}" "tar -xzf - -C \"$REMOTE_DIR\""
          else
            tar -C dist -czf - . | "${SSH_BASE[@]}" "tar -xzf - -C \"$REMOTE_DIR\""
          fi
