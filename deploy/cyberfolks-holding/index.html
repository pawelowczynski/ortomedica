<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ORTHOMEDICA Lubin — wkrótce</title>
    <meta
      name="description"
      content="ORTHOMEDICA — centrum stomatologiczno-ortodontyczne w Lubinie. Aktualizujemy stronę. Zapraszamy do kontaktu."
    />
    <link rel="icon" href="./logo-podpis.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --carmine: #be1433;
        --steel: #1a3a79;
        --muted: #5c6470;
        --bg: #f8f9fb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        font-family: 'Source Sans 3', system-ui, sans-serif;
        background: var(--bg);
        color: var(--steel);
      }
      main {
        max-width: 26rem;
        text-align: center;
      }
      .logo-wrap {
        display: block;
        margin: 0 auto 2rem;
        padding: 0;
        background: transparent;
      }
      .logo-wrap img {
        display: block;
        width: 100%;
        max-width: min(88vw, 340px);
        height: auto;
        margin: 0 auto;
      }
      .soon {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--steel);
        margin-bottom: 2rem;
        line-height: 1.5;
      }
      address {
        font-style: normal;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
        margin-bottom: 1.25rem;
      }
      address strong {
        display: block;
        color: var(--steel);
        font-weight: 600;
        margin-bottom: 0.35rem;
      }
      a.tel {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        padding: 0.85rem 1.5rem;
        background: linear-gradient(120deg, #9f0f2a 0%, var(--carmine) 50%, #9f0f2a 100%);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border-radius: 0.75rem;
        font-size: 1.05rem;
      }
      a.tel:focus-visible {
        outline: 2px solid var(--steel);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo-wrap">
        <img
          src="./logo-podpis.png"
          width="300"
          height="120"
          alt="ORTHOMEDICA — centrum stomatologiczno-ortodontyczne"
        />
      </div>
      <p class="soon">Pracujemy nad nową stroną.<br />Wkrótce wracamy z pełną ofertą.</p>
      <address>
        <strong>ORTHOMEDICA · Lubin</strong>
        ul. Pawia 67<br />
        59-300 Lubin
      </address>
      <a class="tel" href="tel:+48694731124">Zadzwoń: +48 694 731 124</a>
    </main>
  </body>
</html>
